name: Policy Service Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to promote when triggered manually
        required: true
        type: string
      target_branch:
        description: Branch the release is being promoted from
        required: false
        default: main
        type: string

jobs:
  validate_release:
    runs-on: ubuntu-latest
    outputs:
      resolved_release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Validate release metadata
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION="${{ github.event.release.tag_name }}"
            TARGET_BRANCH="${{ github.event.release.target_commitish }}"
          else
            RELEASE_VERSION="${{ inputs.release_version }}"
            TARGET_BRANCH="${{ inputs.target_branch }}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version format: $RELEASE_VERSION. Expected v<major>.<minor>.<patch>" >&2
            exit 1
          fi

          if [ "$TARGET_BRANCH" != "main" ]; then
            echo "Release must target main branch. Current target: $TARGET_BRANCH" >&2
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  release:
    needs: validate_release
    uses: Insurance-Policy-Management-Org/insurance-policy-management/.github/workflows/reusable-release-template.yaml@main
    with:
      service_name: policy-service
      helm_chart_path: policy-service
      release_version: ${{ needs.validate_release.outputs.resolved_release_version }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
