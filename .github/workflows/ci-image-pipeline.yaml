name: Policy Service Main CI Image Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  validate_pr_gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Validate merged PR, approval, and build label
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_build', 'true');
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr || !pr.merged) {
              core.setFailed('Pull request is not merged.');
              return;
            }

            const hasBuildLabel = (pr.labels || []).some((label) => label.name === 'build');
            if (!hasBuildLabel) {
              core.setFailed('Merged PR is missing required label: build');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const hasApproval = reviews.some((review) => review.state === 'APPROVED');
            if (!hasApproval) {
              core.setFailed('Merged PR has no approved review.');
              return;
            }

            core.setOutput('should_build', 'true');

  ci_image_pipeline:
    needs: validate_pr_gate
    if: ${{ needs.validate_pr_gate.outputs.should_build == 'true' }}
    uses: Insurance-Policy-Management-Org/insurance-policy-management/.github/workflows/reusable-ci-template.yaml@main
    with:
      service_name: policy-service
      dockerfile_path: Dockerfile
      image_name: policy-service
      helm_chart_path: policy-service
      run_quality_scans: false
      run_build_and_deploy: true
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
