apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: insurance
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: insurance-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
