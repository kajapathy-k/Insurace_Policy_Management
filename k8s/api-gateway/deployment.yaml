apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: insurance
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: insurance-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: insurance-platform
    spec:
      restartPolicy: Always
      containers:
        - name: api-gateway
          image: kajapathy/api-gateway:v1.1.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-gateway-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
