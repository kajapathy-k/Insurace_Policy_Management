apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: insurance-route
  namespace: insurance
  labels:
    app.kubernetes.io/name: insurance-route
    app.kubernetes.io/part-of: insurance-platform
spec:
  parentRefs:
    - name: insurance-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: api-gateway
          port: 8000
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 3000
          weight: 1
