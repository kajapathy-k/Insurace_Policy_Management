apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-service
  namespace: insurance
  labels:
    app.kubernetes.io/name: claims-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: insurance-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: claims-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claims-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: insurance-platform
    spec:
      restartPolicy: Always
      containers:
        - name: claims-service
          image: kajapathy/claims-service:v1.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: claims-service-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 700m
              memory: 768Mi
