{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ include "api-gateway.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.httpRoute.name }}
    app.kubernetes.io/part-of: {{ .Values.global.partOf }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentRef.name }}
      sectionName: {{ .Values.httpRoute.parentRef.sectionName }}
  rules:
    {{- range .Values.httpRoute.routes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix }}
      {{- if hasKey . "rewritePrefix" }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .rewritePrefix }}
      {{- end }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: {{ .backend.weight }}
    {{- end }}
{{- end }}
